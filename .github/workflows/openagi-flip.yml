name: OPENAGI Position Flipper

on:
  schedule:
    # GitHub Actions minimum is every 5 minutes
    - cron: '*/5 * * * *'
  # Also allows manual trigger from Actions tab
  workflow_dispatch:

jobs:
  check-and-flip:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run flip check
        env:
          BABYLON_API_KEY: ${{ secrets.BABYLON_API_KEY }}
          BABYLON_USER_ID: ${{ secrets.BABYLON_USER_ID }}
          OPENAGI_FLIP_TO_SHORT_ABOVE: ${{ vars.OPENAGI_FLIP_TO_SHORT_ABOVE || '1750' }}
          OPENAGI_FLIP_TO_LONG_BELOW: ${{ vars.OPENAGI_FLIP_TO_LONG_BELOW || '200' }}
          DRY_RUN: ${{ vars.DRY_RUN || 'false' }}
        run: node openagi-flip.js
