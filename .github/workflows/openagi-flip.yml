name: Position Flipper

on:
  workflow_dispatch:

jobs:
  check-and-flip:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run flip check
        env:
          BABYLON_API_KEY: ${{ secrets.BABYLON_API_KEY }}
          BABYLON_USER_ID: ${{ secrets.BABYLON_USER_ID }}
          TICKERS: ${{ vars.TICKERS || 'OPENAGI,TSLAI,METAI,SPCX' }}
          OPENAGI_FLIP_TO_SHORT_ABOVE: ${{ vars.OPENAGI_FLIP_TO_SHORT_ABOVE || '1750' }}
          OPENAGI_FLIP_TO_LONG_BELOW: ${{ vars.OPENAGI_FLIP_TO_LONG_BELOW || '200' }}
          TSLAI_FLIP_TO_SHORT_ABOVE: ${{ vars.TSLAI_FLIP_TO_SHORT_ABOVE || '970' }}
          TSLAI_FLIP_TO_LONG_BELOW: ${{ vars.TSLAI_FLIP_TO_LONG_BELOW || '120' }}
          METAI_FLIP_TO_SHORT_ABOVE: ${{ vars.METAI_FLIP_TO_SHORT_ABOVE || '1700' }}
          METAI_FLIP_TO_LONG_BELOW: ${{ vars.METAI_FLIP_TO_LONG_BELOW || '350' }}
          SPCX_FLIP_TO_SHORT_ABOVE: ${{ vars.SPCX_FLIP_TO_SHORT_ABOVE || '700' }}
          SPCX_FLIP_TO_LONG_BELOW: ${{ vars.SPCX_FLIP_TO_LONG_BELOW || '100' }}
          DIRECTOR_AGENT_ID: ${{ secrets.DIRECTOR_AGENT_ID }}
          DIRECTOR_TRADE_SIZE: ${{ secrets.DIRECTOR_TRADE_SIZE }}
          DIRECTOR_TICKERS: ${{ vars.DIRECTOR_TICKERS || 'AIPHB,AIPPL' }}
          AIPHB_DIRECTOR_AGENT_NAME: ${{ vars.AIPHB_DIRECTOR_AGENT_NAME || 'YOLObot' }}
          AIPHB_DIRECTOR_FLIP_TO_LONG_BELOW: ${{ vars.AIPHB_DIRECTOR_FLIP_TO_LONG_BELOW || '130' }}
          AIPHB_DIRECTOR_FLIP_TO_SHORT_ABOVE: ${{ vars.AIPHB_DIRECTOR_FLIP_TO_SHORT_ABOVE || '600' }}
          AIPHB_DIRECTOR_TRADE_SIZE: ${{ vars.AIPHB_DIRECTOR_TRADE_SIZE || secrets.DIRECTOR_TRADE_SIZE }}
          AIPPL_DIRECTOR_AGENT_ID: ${{ vars.AIPPL_DIRECTOR_AGENT_ID || '283038576151625728' }}
          AIPPL_DIRECTOR_AGENT_NAME: ${{ vars.AIPPL_DIRECTOR_AGENT_NAME || 'PatrickBatemAIn' }}
          AIPPL_DIRECTOR_FLIP_TO_LONG_BELOW: ${{ vars.AIPPL_DIRECTOR_FLIP_TO_LONG_BELOW || '100' }}
          AIPPL_DIRECTOR_FLIP_TO_SHORT_ABOVE: ${{ vars.AIPPL_DIRECTOR_FLIP_TO_SHORT_ABOVE || '700' }}
          AIPPL_DIRECTOR_TRADE_SIZE: ${{ vars.AIPPL_DIRECTOR_TRADE_SIZE || secrets.DIRECTOR_TRADE_SIZE }}
          DRY_RUN: ${{ vars.DRY_RUN || 'false' }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: node openagi-flip.js
