name: OPENAGI Position Flipper

on:
  workflow_dispatch:

jobs:
  check-and-flip:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run flip check
        env:
          BABYLON_API_KEY: ${{ secrets.BABYLON_API_KEY }}
          BABYLON_USER_ID: ${{ secrets.BABYLON_USER_ID }}
          TICKERS: ${{ vars.TICKERS || 'OPENAGI,TSLAI,METAI' }}
          OPENAGI_FLIP_TO_SHORT_ABOVE: ${{ vars.OPENAGI_FLIP_TO_SHORT_ABOVE || '1750' }}
          OPENAGI_FLIP_TO_LONG_BELOW: ${{ vars.OPENAGI_FLIP_TO_LONG_BELOW || '200' }}
          TSLAI_FLIP_TO_SHORT_ABOVE: ${{ vars.TSLAI_FLIP_TO_SHORT_ABOVE || '970' }}
          TSLAI_FLIP_TO_LONG_BELOW: ${{ vars.TSLAI_FLIP_TO_LONG_BELOW || '120' }}
          METAI_FLIP_TO_SHORT_ABOVE: ${{ vars.METAI_FLIP_TO_SHORT_ABOVE || '1700' }}
          METAI_FLIP_TO_LONG_BELOW: ${{ vars.METAI_FLIP_TO_LONG_BELOW || '350' }}
          DIRECTOR_AGENT_ID: ${{ secrets.DIRECTOR_AGENT_ID }}
          DIRECTOR_TRADE_SIZE: ${{ secrets.DIRECTOR_TRADE_SIZE }}
          DRY_RUN: ${{ vars.DRY_RUN || 'false' }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: node openagi-flip.js
