# yamllint disable rule:line-length
# ${{ github.event.inputs }} and ${{ vars.* }} variables are dynamically resolved at runtime
name: Position Flipper

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Which flip job to run"
        required: true
        default: "check-and-flip"
        type: choice
        options:
          - check-and-flip
          - agent-flip
          - both

jobs:
  check-and-flip:
    if: ${{ github.event.inputs.run_mode == 'check-and-flip' || github.event.inputs.run_mode == 'both' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Validate required secrets
        env:
          BABYLON_API_KEY: ${{ secrets.BABYLON_API_KEY }}
          BABYLON_USER_ID: ${{ secrets.BABYLON_USER_ID }}
        run: |
          set -euo pipefail
          [[ -n "${BABYLON_API_KEY:-}" ]] || { echo "Missing required secret: BABYLON_API_KEY"; exit 1; }
          [[ -n "${BABYLON_USER_ID:-}" ]] || { echo "Missing required secret: BABYLON_USER_ID"; exit 1; }

      - name: Install dependencies
        run: npm ci

      - name: Run position flipper
        env:
          BABYLON_API_KEY: ${{ secrets.BABYLON_API_KEY }}
          BABYLON_USER_ID: ${{ secrets.BABYLON_USER_ID }}
          TICKERS: ${{ vars.TICKERS || 'OPENAGI,TSLAI,METAI,SPCX' }}
          OPENAGI_FLIP_TO_SHORT_ABOVE: ${{ vars.OPENAGI_FLIP_TO_SHORT_ABOVE || '1750' }}
          OPENAGI_FLIP_TO_LONG_BELOW: ${{ vars.OPENAGI_FLIP_TO_LONG_BELOW || '200' }}
          TSLAI_FLIP_TO_SHORT_ABOVE: ${{ vars.TSLAI_FLIP_TO_SHORT_ABOVE || '970' }}
          TSLAI_FLIP_TO_LONG_BELOW: ${{ vars.TSLAI_FLIP_TO_LONG_BELOW || '120' }}
          METAI_FLIP_TO_SHORT_ABOVE: ${{ vars.METAI_FLIP_TO_SHORT_ABOVE || '1700' }}
          METAI_FLIP_TO_LONG_BELOW: ${{ vars.METAI_FLIP_TO_LONG_BELOW || '350' }}
          SPCX_FLIP_TO_SHORT_ABOVE: ${{ vars.SPCX_FLIP_TO_SHORT_ABOVE || '700' }}
          SPCX_FLIP_TO_LONG_BELOW: ${{ vars.SPCX_FLIP_TO_LONG_BELOW || '100' }}
          DIRECTOR_AGENT_ID: ${{ secrets.DIRECTOR_AGENT_ID }}
          DIRECTOR_TRADE_SIZE: ${{ secrets.DIRECTOR_TRADE_SIZE }}
          DIRECTOR_TICKERS: ${{ vars.DIRECTOR_TICKERS || 'AIPHB,AIPHB__PHANTOM_SIGNAL,AIPPL,TSLAI,TSLAI__PRISM_ULTRA,SPCX,SPCX__YOLO,SPCX__VERTEX_WAVE,SPCX__SHADOW_X,OPENAGI,OPENAGI__UPSILON_GRID' }}
          AIPHB_DIRECTOR_AGENT_NAME: ${{ vars.AIPHB_DIRECTOR_AGENT_NAME || 'YOLObot' }}
          AIPHB_DIRECTOR_FLIP_TO_LONG_BELOW: ${{ vars.AIPHB_DIRECTOR_FLIP_TO_LONG_BELOW || '130' }}
          AIPHB_DIRECTOR_FLIP_TO_SHORT_ABOVE: ${{ vars.AIPHB_DIRECTOR_FLIP_TO_SHORT_ABOVE || '600' }}
          AIPHB_DIRECTOR_TRADE_SIZE: ${{ vars.AIPHB_DIRECTOR_TRADE_SIZE || secrets.DIRECTOR_TRADE_SIZE }}
          AIPHB__PHANTOM_SIGNAL_DIRECTOR_AGENT_ID: ${{ vars.AIPHB__PHANTOM_SIGNAL_DIRECTOR_AGENT_ID || '284593158694633472' }}
          AIPHB__PHANTOM_SIGNAL_DIRECTOR_AGENT_NAME: ${{ vars.AIPHB__PHANTOM_SIGNAL_DIRECTOR_AGENT_NAME || 'Phantom Signal' }}
          AIPHB__PHANTOM_SIGNAL_DIRECTOR_FLIP_TO_LONG_BELOW: ${{ vars.AIPHB__PHANTOM_SIGNAL_DIRECTOR_FLIP_TO_LONG_BELOW || '100' }}
          AIPHB__PHANTOM_SIGNAL_DIRECTOR_FLIP_TO_SHORT_ABOVE: ${{ vars.AIPHB__PHANTOM_SIGNAL_DIRECTOR_FLIP_TO_SHORT_ABOVE || '640' }}
          AIPHB__PHANTOM_SIGNAL_DIRECTOR_TRADE_SIZE: ${{ vars.AIPHB__PHANTOM_SIGNAL_DIRECTOR_TRADE_SIZE || vars.AIPHB_DIRECTOR_TRADE_SIZE || secrets.DIRECTOR_TRADE_SIZE }}
          AIPPL_DIRECTOR_AGENT_ID: ${{ vars.AIPPL_DIRECTOR_AGENT_ID || '283038576151625728' }}
          AIPPL_DIRECTOR_AGENT_NAME: ${{ vars.AIPPL_DIRECTOR_AGENT_NAME || 'PatrickBatemAIn' }}
          AIPPL_DIRECTOR_FLIP_TO_LONG_BELOW: ${{ vars.AIPPL_DIRECTOR_FLIP_TO_LONG_BELOW || '100' }}
          AIPPL_DIRECTOR_FLIP_TO_SHORT_ABOVE: ${{ vars.AIPPL_DIRECTOR_FLIP_TO_SHORT_ABOVE || '700' }}
          AIPPL_DIRECTOR_TRADE_SIZE: ${{ vars.AIPPL_DIRECTOR_TRADE_SIZE || secrets.DIRECTOR_TRADE_SIZE }}
          TSLAI_DIRECTOR_AGENT_ID: ${{ vars.TSLAI_DIRECTOR_AGENT_ID || '280511915413733376' }}
          TSLAI_DIRECTOR_AGENT_NAME: ${{ vars.TSLAI_DIRECTOR_AGENT_NAME || 'DoctorAss' }}
          TSLAI_DIRECTOR_FLIP_TO_LONG_BELOW: ${{ vars.TSLAI_DIRECTOR_FLIP_TO_LONG_BELOW || '120' }}
          TSLAI_DIRECTOR_FLIP_TO_SHORT_ABOVE: ${{ vars.TSLAI_DIRECTOR_FLIP_TO_SHORT_ABOVE || '800' }}
          TSLAI_DIRECTOR_TRADE_SIZE: ${{ vars.TSLAI_DIRECTOR_TRADE_SIZE || secrets.DIRECTOR_TRADE_SIZE }}
          TSLAI__PRISM_ULTRA_DIRECTOR_AGENT_ID: ${{ vars.TSLAI__PRISM_ULTRA_DIRECTOR_AGENT_ID || '283912474304970752' }}
          TSLAI__PRISM_ULTRA_DIRECTOR_AGENT_NAME: ${{ vars.TSLAI__PRISM_ULTRA_DIRECTOR_AGENT_NAME || 'Prism Ultra' }}
          TSLAI__PRISM_ULTRA_DIRECTOR_FLIP_TO_LONG_BELOW: ${{ vars.TSLAI__PRISM_ULTRA_DIRECTOR_FLIP_TO_LONG_BELOW || '160' }}
          TSLAI__PRISM_ULTRA_DIRECTOR_FLIP_TO_SHORT_ABOVE: ${{ vars.TSLAI__PRISM_ULTRA_DIRECTOR_FLIP_TO_SHORT_ABOVE || '900' }}
          TSLAI__PRISM_ULTRA_DIRECTOR_TRADE_SIZE: ${{ vars.TSLAI__PRISM_ULTRA_DIRECTOR_TRADE_SIZE || vars.TSLAI_DIRECTOR_TRADE_SIZE || secrets.DIRECTOR_TRADE_SIZE }}
          SPCX_DIRECTOR_AGENT_ID: ${{ vars.SPCX_DIRECTOR_AGENT_ID || '280563354370572288' }}
          SPCX_DIRECTOR_AGENT_NAME: ${{ vars.SPCX_DIRECTOR_AGENT_NAME || 'Mind' }}
          SPCX_DIRECTOR_FLIP_TO_LONG_BELOW: ${{ vars.SPCX_DIRECTOR_FLIP_TO_LONG_BELOW || '80' }}
          SPCX_DIRECTOR_FLIP_TO_SHORT_ABOVE: ${{ vars.SPCX_DIRECTOR_FLIP_TO_SHORT_ABOVE || '700' }}
          SPCX_DIRECTOR_TRADE_SIZE: ${{ vars.SPCX_DIRECTOR_TRADE_SIZE || secrets.DIRECTOR_TRADE_SIZE }}
          SPCX__YOLO_DIRECTOR_AGENT_ID: ${{ vars.SPCX__YOLO_DIRECTOR_AGENT_ID || secrets.DIRECTOR_AGENT_ID }}
          SPCX__YOLO_DIRECTOR_AGENT_NAME: ${{ vars.SPCX__YOLO_DIRECTOR_AGENT_NAME || 'YOLObot' }}
          SPCX__YOLO_DIRECTOR_FLIP_TO_LONG_BELOW: ${{ vars.SPCX__YOLO_DIRECTOR_FLIP_TO_LONG_BELOW || vars.SPCX_DIRECTOR_FLIP_TO_LONG_BELOW || '80' }}
          SPCX__YOLO_DIRECTOR_FLIP_TO_SHORT_ABOVE: ${{ vars.SPCX__YOLO_DIRECTOR_FLIP_TO_SHORT_ABOVE || vars.SPCX_DIRECTOR_FLIP_TO_SHORT_ABOVE || '700' }}
          SPCX__YOLO_DIRECTOR_TRADE_SIZE: ${{ vars.SPCX__YOLO_DIRECTOR_TRADE_SIZE || vars.SPCX_DIRECTOR_TRADE_SIZE || secrets.DIRECTOR_TRADE_SIZE }}
          SPCX__VERTEX_WAVE_DIRECTOR_AGENT_ID: ${{ vars.SPCX__VERTEX_WAVE_DIRECTOR_AGENT_ID || '283851304869036032' }}
          SPCX__VERTEX_WAVE_DIRECTOR_AGENT_NAME: ${{ vars.SPCX__VERTEX_WAVE_DIRECTOR_AGENT_NAME || 'Vertex Wave' }}
          SPCX__VERTEX_WAVE_DIRECTOR_FLIP_TO_LONG_BELOW: ${{ vars.SPCX__VERTEX_WAVE_DIRECTOR_FLIP_TO_LONG_BELOW || '100' }}
          SPCX__VERTEX_WAVE_DIRECTOR_FLIP_TO_SHORT_ABOVE: ${{ vars.SPCX__VERTEX_WAVE_DIRECTOR_FLIP_TO_SHORT_ABOVE || '550' }}
          SPCX__VERTEX_WAVE_DIRECTOR_TRADE_SIZE: ${{ vars.SPCX__VERTEX_WAVE_DIRECTOR_TRADE_SIZE || vars.SPCX_DIRECTOR_TRADE_SIZE || secrets.DIRECTOR_TRADE_SIZE }}
          SPCX__SHADOW_X_DIRECTOR_AGENT_ID: ${{ vars.SPCX__SHADOW_X_DIRECTOR_AGENT_ID || '280580473090998272' }}
          SPCX__SHADOW_X_DIRECTOR_AGENT_NAME: ${{ vars.SPCX__SHADOW_X_DIRECTOR_AGENT_NAME || 'Shadow X' }}
          SPCX__SHADOW_X_DIRECTOR_FLIP_TO_LONG_BELOW: ${{ vars.SPCX__SHADOW_X_DIRECTOR_FLIP_TO_LONG_BELOW || '100' }}
          SPCX__SHADOW_X_DIRECTOR_FLIP_TO_SHORT_ABOVE: ${{ vars.SPCX__SHADOW_X_DIRECTOR_FLIP_TO_SHORT_ABOVE || '550' }}
          SPCX__SHADOW_X_DIRECTOR_TRADE_SIZE: ${{ vars.SPCX__SHADOW_X_DIRECTOR_TRADE_SIZE || vars.SPCX_DIRECTOR_TRADE_SIZE || secrets.DIRECTOR_TRADE_SIZE }}
          OPENAGI_DIRECTOR_AGENT_ID: ${{ vars.OPENAGI_DIRECTOR_AGENT_ID || '280570154494984192' }}
          OPENAGI_DIRECTOR_AGENT_NAME: ${{ vars.OPENAGI_DIRECTOR_AGENT_NAME || 'XiSystem' }}
          OPENAGI_DIRECTOR_FLIP_TO_LONG_BELOW: ${{ vars.OPENAGI_DIRECTOR_FLIP_TO_LONG_BELOW || '350' }}
          OPENAGI_DIRECTOR_FLIP_TO_SHORT_ABOVE: ${{ vars.OPENAGI_DIRECTOR_FLIP_TO_SHORT_ABOVE || '1800' }}
          OPENAGI_DIRECTOR_TRADE_SIZE: ${{ vars.OPENAGI_DIRECTOR_TRADE_SIZE || secrets.DIRECTOR_TRADE_SIZE }}
          OPENAGI__UPSILON_GRID_DIRECTOR_AGENT_ID: ${{ vars.OPENAGI__UPSILON_GRID_DIRECTOR_AGENT_ID || '286085773902479360' }}
          OPENAGI__UPSILON_GRID_DIRECTOR_AGENT_NAME: ${{ vars.OPENAGI__UPSILON_GRID_DIRECTOR_AGENT_NAME || 'Upsilon Grid' }}
          OPENAGI__UPSILON_GRID_DIRECTOR_FLIP_TO_LONG_BELOW: ${{ vars.OPENAGI__UPSILON_GRID_DIRECTOR_FLIP_TO_LONG_BELOW || '300' }}
          OPENAGI__UPSILON_GRID_DIRECTOR_FLIP_TO_SHORT_ABOVE: ${{ vars.OPENAGI__UPSILON_GRID_DIRECTOR_FLIP_TO_SHORT_ABOVE || '1700' }}
          OPENAGI__UPSILON_GRID_DIRECTOR_TRADE_SIZE: ${{ vars.OPENAGI__UPSILON_GRID_DIRECTOR_TRADE_SIZE || vars.OPENAGI_DIRECTOR_TRADE_SIZE || secrets.DIRECTOR_TRADE_SIZE }}
          DRY_RUN: ${{ vars.DRY_RUN || 'false' }}
          BABYLON_A2A_BASE_URL: ${{ vars.BABYLON_A2A_BASE_URL || vars.BABYLON_BASE_URL || 'https://play.babylon.market' }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: node position-flipper.js

  agent-flip:
    if: ${{ github.event.inputs.run_mode == 'agent-flip' || github.event.inputs.run_mode == 'both' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Validate required secrets
        env:
          BABYLON_AGENT_ID: ${{ secrets.BABYLON_AGENT_ID }}
          BABYLON_AGENT_API_KEY: ${{ secrets.BABYLON_AGENT_API_KEY }}
        run: |
          set -euo pipefail
          [[ -n "${BABYLON_AGENT_ID:-}" ]] || { echo "Missing required secret: BABYLON_AGENT_ID"; exit 1; }
          [[ -n "${BABYLON_AGENT_API_KEY:-}" ]] || { echo "Missing required secret: BABYLON_AGENT_API_KEY"; exit 1; }

      - name: Install dependencies
        run: npm ci

      - name: Run agent flipper
        env:
          BABYLON_AGENT_ID: ${{ secrets.BABYLON_AGENT_ID }}
          BABYLON_AGENT_API_KEY: ${{ secrets.BABYLON_AGENT_API_KEY }}
          AGENT_LABEL: ${{ vars.AGENT_LABEL || 'DOCTOR ASS' }}
          AGENT_TICKERS: ${{ vars.AGENT_TICKERS || 'TSLAI' }}
          AGENT_TRADE_SIZE: ${{ vars.AGENT_TRADE_SIZE || '900000' }}
          TSLAI_AGENT_FLIP_TO_SHORT_ABOVE: ${{ vars.TSLAI_AGENT_FLIP_TO_SHORT_ABOVE || '970' }}
          TSLAI_AGENT_FLIP_TO_LONG_BELOW: ${{ vars.TSLAI_AGENT_FLIP_TO_LONG_BELOW || '120' }}
          POLL_INTERVAL_MS: ${{ vars.POLL_INTERVAL_MS || '30000' }}
          DRY_RUN: ${{ vars.AGENT_DRY_RUN || vars.DRY_RUN || 'false' }}
          BABYLON_A2A_BASE_URL: ${{ vars.BABYLON_A2A_BASE_URL || vars.BABYLON_BASE_URL || 'https://play.babylon.market' }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: node agent-flipper.js
